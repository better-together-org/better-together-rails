
# Manages the development environment for the New to NL app

# The host app (built using the Better Together Community Engine),
# a PostgreSQL db,
# pg_search-backed search,
# a mail server,
# redis,
# Sidekiq

volumes:
  bt-bundler-gems:
    name: better-together-rails_bt-bundler-gems
  bt-db-data:
    name: better-together-rails_bt-db-data
  bt-redis:
    name: better-together-rails_bt-redis

x-env-info: &env-info
  env_file:
    - './.env.dev'
    # - './.env'

x-app-shared: &app-shared
  <<: *env-info
  image: better-together/better-together-rails:dev
  volumes:
    - .:/bt
    - ${COMMUNITY_ENGINE_PATH:-../community-engine-rails}:/community-engine
    - bt-bundler-gems:/usr/local/bundle/
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    DB_HOST: ${DB_HOST:-host.docker.internal}
    DB_PORT: ${DB_PORT:-5431}
    DB_USERNAME: ${DB_USERNAME:-postgres}
    DB_PASSWORD: ${DB_PASSWORD:-postgres}
    BTR_WORKTREE_DB_SUFFIX: ${BTR_WORKTREE_DB_SUFFIX:-}
    REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6382}
  depends_on:
    - db
    - redis
  # user: $USER:$USER

services:
  app: &app
    <<: *app-shared
    container_name: better-together-app
    build: # "context" and "dockerfile" fields have to be under "build"
      context: .
      dockerfile: ./Dockerfile.dev
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3001 -b '0.0.0.0'"
    ports:
      - "3001:3001"
  db:
    <<: *env-info
    container_name: better-together-db
    image: postgis/postgis:latest
    volumes:
      - bt-db-data:/var/lib/postgresql/data
    ports:
      - "5431:5432"

  mail-server:
    image: mailhog/mailhog
    container_name: better-together-smtp
    ports:
      - '1025:1025'
      - '8026:8025'

  redis:
    image: 'redis:7.2-alpine'
    container_name: better-together-redis
    command: redis-server
    ports:
      - "6382:6379"
    volumes:
      - bt-redis:/data

  sidekiq:
    <<: *app-shared
    container_name: better-together-sidekiq
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on:
      - app
