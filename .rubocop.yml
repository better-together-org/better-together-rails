plugins: rubocop-rspec

AllCops:
  Exclude:
    - 'bin/*'
    - 'node_modules/**/*'
    - 'db/schema.rb'
    - 'db/migrate/*.better_together.rb'
    - 'vendor/**/*'
    - 'tmp/**/*'               # CI compat copies and build artifacts
    - 'worktrees/**/*'         # git worktrees — checked-out branches, not project source
  NewCops: enable
Style/StringLiterals:
  Exclude:
    - 'db/migrate/*'
